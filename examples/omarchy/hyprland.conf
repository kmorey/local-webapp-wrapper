# Example Omarchy/Hyprland bindings and window rules.
# Add bindings to ~/.config/hypr/bindings.conf, then reload Hyprland.

bindd = SUPER SHIFT, E, Email, exec, uwsm-app -- ~/.local/bin/local-webapp-wrapper gmail
bindd = SUPER SHIFT, B, Basecamp, exec, uwsm-app -- ~/.local/bin/local-webapp-wrapper basecamp

# Add window rules in ~/.config/hypr/apps/gmail.conf or another sourced file.
windowrule {
  name = local-webapp-email
  float = on
  center = on
  opacity = 1 1
  size = (monitor_w*0.8) (monitor_h*0.8)
  match:class = local-webapp-email
}

windowrule {
  name = local-webapp-basecamp
  float = on
  center = on
  opacity = 1 1
  size = (monitor_w*0.8) (monitor_h*0.9)
  match:class = local-webapp-basecamp
}
